<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公告管理</title>
  <link rel="stylesheet" href="../css/styles.css?v=20260724-compact-layout">
  <style>
    .announcement-panel {
      max-width: 720px;
    }

    .announcement-form {
      display: grid;
      gap: 20px;
    }

    .announcement-form input,
    .announcement-form textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      padding: 10px 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
      outline: none;
    }

    .announcement-form textarea {
      min-height: clamp(160px, 28vh, 260px);
      resize: vertical;
      line-height: 1.65;
    }

    .announcement-form input:focus,
    .announcement-form textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .field-meta,
    .announcement-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      background: #f8fafc;
    }

    .toggle-row input {
      width: 20px;
      height: 20px;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    @media (max-width: 640px) {
      .announcement-panel {
        max-width: 100%;
      }

      .announcement-form {
        gap: 16px;
      }

      .announcement-form textarea {
        min-height: 180px;
      }

      .toggle-row {
        padding: 12px 14px;
      }

      .announcement-meta {
        flex-direction: column;
        gap: 4px;
      }

      .form-actions {
        flex-direction: column;
      }

      .form-actions .button {
        width: 100%;
        min-height: 44px;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#mainContent">跳到公告表单</a>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-brand">
        <h1>公告管理</h1>
        <nav class="topbar-nav" aria-label="后台页面">
          <a href="./index.html">审核台</a>
          <a href="./goods.html">商品管理</a>
        </nav>
      </div>
      <div class="topbar-user">
        <p class="status-indicator" aria-live="polite">
          <span class="status-dot" id="sessionDot"></span>
          <span id="sessionTitle">未登录</span>
        </p>
        <button id="showLoginBtn" class="button topbar-login" type="button">登录</button>
        <button id="logoutBtn" class="button topbar-logout" type="button" hidden>退出</button>
      </div>
    </header>

    <main id="mainContent" class="workspace" tabindex="-1">
      <header class="workspace-head">
        <div>
          <h2 style="margin:0 0 6px;">小程序启动公告</h2>
          <p style="margin:0;color:var(--muted);">修改已启用的公告后，已读用户当天也会再次看到新版本。</p>
        </div>
      </header>

      <section class="panel announcement-panel">
        <form id="announcementForm" class="announcement-form">
          <label class="field">
            <span>标题</span>
            <input id="titleInput" type="text" maxlength="50" placeholder="请输入公告标题" disabled>
            <span class="field-meta"><span>最多 50 字</span><span id="titleCount">0/50</span></span>
          </label>

          <label class="field">
            <span>正文</span>
            <textarea id="contentInput" maxlength="1000" placeholder="请输入公告正文" disabled></textarea>
            <span class="field-meta"><span>支持换行，最多 1000 字</span><span id="contentCount">0/1000</span></span>
          </label>

          <label class="toggle-row">
            <span>
              <strong>启用公告</strong><br>
              <small style="color:var(--muted);">关闭后小程序不再弹出公告</small>
            </span>
            <input id="enabledInput" type="checkbox" disabled>
          </label>

          <div class="announcement-meta">
            <span>当前版本：<strong id="revisionText">-</strong></span>
            <span>更新时间：<strong id="updatedAtText">-</strong></span>
          </div>

          <div class="form-actions">
            <button id="reloadBtn" class="button secondary" type="button" disabled>重新加载</button>
            <button id="saveBtn" class="button primary" type="submit" disabled>保存公告</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <!-- 登录弹窗 -->
  <div id="loginModal" class="login-modal-overlay" aria-hidden="true">
    <div class="login-modal" role="dialog" aria-modal="true" aria-labelledby="loginModalTitle">
      <div class="login-modal-head">
        <div>
          <h3 id="loginModalTitle">审核员登录</h3>
          <p>登录后即可继续处理图片、商品和公告。</p>
        </div>
        <button id="closeLoginBtn" class="button ghost login-modal-close" type="button" aria-label="关闭登录弹窗">关闭</button>
      </div>
      <form id="loginForm" class="stack">
        <label class="field">
          <span>用户名</span>
          <input id="emailInput" type="text" placeholder="审核员账号" autocomplete="username" required>
        </label>
        <label class="field">
          <span>密码</span>
          <input id="passwordInput" type="password" placeholder="请输入密码" autocomplete="current-password" required>
        </label>
        <div class="auth-actions">
          <button id="loginBtn" class="button primary" type="submit">登录</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="../js/messages.js"></script>
  <script src="../js/auth.js?v=20260724-compact-layout"></script>
  <script src="../js/announcement.js?v=20260721-beijing-time"></script>
</body>
</html>
