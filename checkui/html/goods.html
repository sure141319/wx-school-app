<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品管理</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    /* 商品管理专用样式 */
    .goods-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .goods-toolbar .search-group {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .goods-toolbar .search-group input,
    .goods-toolbar .search-group select {
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      padding: 8px 12px;
      background: #fff;
      font-size: 0.9rem;
      outline: none;
    }

    .goods-toolbar .search-group input:focus,
    .goods-toolbar .search-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .goods-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .goods-table th,
    .goods-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--surface-border);
    }

    .goods-table th {
      font-weight: 600;
      color: var(--muted);
      background: #f9fafb;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.025em;
    }

    .goods-table tbody tr:hover {
      background: #f8fafc;
    }

    .goods-table tbody tr.is-deleting {
      opacity: 0.5;
      pointer-events: none;
    }

    .goods-table .col-checkbox {
      width: 40px;
      text-align: center;
    }

    .goods-table .col-id {
      width: 60px;
    }

    .goods-table .col-price {
      width: 80px;
    }

    .goods-table .col-status {
      width: 90px;
    }

    .goods-table .col-category {
      width: 100px;
    }

    .goods-table .col-actions {
      width: 80px;
      text-align: center;
    }

    .goods-table .col-date {
      width: 120px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .status-badge.on-sale {
      background: #d1fae5;
      color: #065f46;
    }

    .status-badge.off-shelf {
      background: #e5e7eb;
      color: #374151;
    }

    .btn-icon {
      padding: 6px 12px;
      font-size: 0.85rem;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: background-color 150ms ease;
    }

    .btn-icon.danger {
      background: #fee2e2;
      color: #dc2626;
    }

    .btn-icon.danger:hover:not(:disabled) {
      background: #fecaca;
    }

    .btn-icon:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .batch-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: var(--radius);
      margin-bottom: 12px;
    }

    .batch-bar.hidden {
      display: none;
    }

    .batch-info {
      font-size: 0.9rem;
      color: var(--text);
    }

    .batch-actions {
      display: flex;
      gap: 8px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }

    .modal-overlay.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .modal-title {
      margin: 0 0 12px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .modal-body {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .goods-image-thumb {
      width: 48px;
      height: 48px;
      border-radius: var(--radius);
      object-fit: cover;
      border: 1px solid var(--surface-border);
    }

    .goods-title-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .goods-title-text {
      font-weight: 500;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty-table {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }

    .seller-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .seller-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      object-fit: cover;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      margin-top: 12px;
      opacity: 0.8;
      transition: opacity 150ms ease;
    }

    .back-link:hover {
      opacity: 1;
    }

    .goods-count {
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <section class="brand-block">
        <h1>商品管理</h1>
        <p class="status-indicator">
          <span class="status-dot" id="sessionDot"></span>
          <span id="sessionTitle">未登录</span>
        </p>
        <a href="./index.html" class="back-link">&larr; 返回审核台</a>
      </section>

      <section class="panel login-panel">
        <div id="loginInfo" class="stack" style="display:none;">
          <p style="margin:0;font-size:0.9rem;">已登录</p>
          <button id="logoutBtn" class="button ghost" type="button">退出登录</button>
        </div>
        <div id="loginPrompt" class="stack">
          <p style="margin:0;font-size:0.9rem;color:var(--muted);">请先在审核台登录</p>
          <a href="./index.html" class="button primary" style="text-align:center;text-decoration:none;">去审核台登录</a>
        </div>
      </section>

      <section class="panel config-panel">
        <details>
          <summary>后端配置</summary>
          <div class="config-content">
            <label class="field">
              <span>API 地址</span>
              <input id="apiBaseUrl" type="text" placeholder="http://localhost:8080/api/v1">
            </label>
            <button id="saveConfigBtn" class="button secondary" type="button">保存</button>
          </div>
        </details>
      </section>
    </aside>

    <main class="workspace">
      <header class="workspace-head">
        <div class="goods-toolbar">
          <div class="search-group">
            <input id="keywordInput" type="text" placeholder="搜索商品标题..." style="width:200px;">
            <select id="categorySelect">
              <option value="">全部分类</option>
            </select>
            <select id="statusSelect">
              <option value="">全部状态</option>
              <option value="ON_SALE">在售中</option>
              <option value="OFF_SHELF">已下架</option>
            </select>
            <button id="searchBtn" class="button primary" type="button">搜索</button>
            <button id="resetBtn" class="button secondary" type="button">重置</button>
          </div>
          <div class="goods-count">
            共 <strong id="totalCount">0</strong> 条
          </div>
        </div>
      </header>

      <section class="panel" style="padding:0;overflow:hidden;">
        <div id="batchBar" class="batch-bar hidden">
          <span class="batch-info">已选中 <strong id="batchCount">0</strong> 件商品</span>
          <div class="batch-actions">
            <button id="batchDeleteBtn" class="button secondary" type="button" style="color:var(--danger);">批量删除</button>
            <button id="clearSelectionBtn" class="button ghost" type="button">取消选择</button>
          </div>
        </div>

        <div style="padding:0 16px;overflow-x:auto;">
          <table class="goods-table">
            <thead>
              <tr>
                <th class="col-checkbox">
                  <input type="checkbox" id="selectAllCheckbox" title="全选">
                </th>
                <th class="col-id">ID</th>
                <th>商品信息</th>
                <th class="col-price">价格</th>
                <th class="col-status">状态</th>
                <th class="col-category">分类</th>
                <th>卖家</th>
                <th class="col-date">发布时间</th>
                <th class="col-actions">操作</th>
              </tr>
            </thead>
            <tbody id="goodsTableBody">
              <tr>
                <td colspan="9" class="empty-table">
                  <div style="padding:24px;">
                    <h4 style="margin:0 0 8px;">请先登录</h4>
                    <p style="margin:0;">登录后可查看商品列表</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="pager" style="padding:12px 16px;">
          <button id="prevPageBtn" class="button ghost" type="button">上一页</button>
          <span id="pageIndicator">第 1 页</span>
          <button id="nextPageBtn" class="button ghost" type="button">下一页</button>
        </div>
      </section>
    </main>
  </div>

  <!-- 删除确认弹窗 -->
  <div id="confirmModal" class="modal-overlay">
    <div class="modal">
      <h3 class="modal-title">确认删除</h3>
      <p class="modal-body" id="modalBody">确定要删除该商品吗？此操作不可撤销。</p>
      <div class="modal-actions">
        <button id="modalCancel" class="button secondary" type="button">取消</button>
        <button id="modalConfirm" class="button primary" type="button" style="background:var(--danger);">删除</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="../js/goods.js"></script>
</body>
</html>
