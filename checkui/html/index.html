<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片审核台</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <section class="brand-block">
        <h1 id="pageTitle">商品图片审核台</h1>
        <p class="status-indicator">
          <span class="status-dot" id="sessionDot"></span>
          <span id="sessionTitle">未登录</span>
        </p>
        <a href="./goods.html" class="back-link" style="color:#fff;text-decoration:none;font-size:0.85rem;margin-top:12px;display:inline-flex;align-items:center;gap:6px;opacity:0.8;transition:opacity 150ms ease;"
           onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'">&#8594; 前往商品管理</a>
      </section>

      <section class="panel login-panel">
        <form id="loginForm" class="stack">
          <label class="field">
            <span>用户名</span>
            <input id="emailInput" type="text" placeholder="审核员账号" autocomplete="username">
          </label>
          <label class="field">
            <span>密码</span>
            <input id="passwordInput" type="password" placeholder="请输入密码" autocomplete="current-password">
          </label>
          <div class="auth-actions">
            <button id="loginBtn" class="button primary" type="submit">登录</button>
            <button id="logoutBtn" class="button ghost" type="button" disabled>退出</button>
          </div>
        </form>
      </section>

      <section class="panel stats-panel">
        <div class="stats-row">
          <div class="stat-item">
            <span class="stat-label">当前</span>
            <strong id="summaryStatus" class="stat-value">待审核</strong>
          </div>
          <div class="stat-item">
            <span class="stat-label">总数</span>
            <strong id="summaryTotal" class="stat-value">0</strong>
          </div>
          <div class="stat-item">
            <span class="stat-label">页码</span>
            <strong id="summaryPage" class="stat-value">1/1</strong>
          </div>
        </div>
      </section>

      <section class="panel config-panel">
        <details>
          <summary>后端配置</summary>
          <div class="config-content">
            <label class="field">
              <span>API 地址</span>
              <input id="apiBaseUrl" type="text" placeholder="http://localhost:8080/api/v1">
            </label>
            <button id="saveConfigBtn" class="button secondary" type="button">保存</button>
          </div>
        </details>
        <div id="originNotice" class="origin-notice" hidden></div>
      </section>
    </aside>

    <main class="workspace">
      <header class="workspace-head">
        <div class="toolbar">
          <div class="pill-group" id="typeFilters">
            <button class="pill is-active" data-type="goods" type="button">商品图片</button>
            <button class="pill" data-type="avatar" type="button">头像</button>
          </div>
          <div class="pill-group" id="statusFilters">
            <button class="pill is-active" data-status="PENDING" type="button">待审核</button>
            <button class="pill" data-status="APPROVED" type="button">已通过</button>
            <button class="pill" data-status="REJECTED" type="button">已驳回</button>
          </div>
          <div class="toolbar-actions">
            <select id="pageSizeSelect" class="page-size-select">
              <option value="10">10条/页</option>
              <option value="20">20条/页</option>
              <option value="30">30条/页</option>
              <option value="50">50条/页</option>
            </select>
            <button id="refreshBtn" class="button secondary" type="button">刷新</button>
          </div>
        </div>
      </header>

      <section class="board">
        <section class="panel queue-panel">
          <div id="queueMeta" class="queue-meta">登录后可查看审核列表</div>
          <div id="queueList" class="queue-list"></div>
          <div class="pager">
            <button id="prevPageBtn" class="button ghost" type="button">上一页</button>
            <span id="pageIndicator">第 1 页</span>
            <button id="nextPageBtn" class="button ghost" type="button">下一页</button>
          </div>
        </section>

        <section class="panel detail-panel">
          <div id="detailContent" class="detail-content">
            <div class="empty-state">
              <h4>请选择图片</h4>
              <p>从左侧列表选择一条记录进行审核</p>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="../js/app.js"></script>
</body>
</html>
