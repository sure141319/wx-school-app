<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片审核台</title>
  <link rel="stylesheet" href="../css/styles.css?v=20260724-compact-layout">
</head>
<body>
  <a class="skip-link" href="#mainContent">跳到审核内容</a>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-brand">
        <h1 id="pageTitle">商品图片审核台</h1>
        <nav class="topbar-nav" aria-label="后台页面">
          <a href="./goods.html">商品管理</a>
          <a href="./announcement.html">公告管理</a>
        </nav>
      </div>
      <div class="topbar-user">
        <p class="status-indicator" aria-live="polite">
          <span class="status-dot" id="sessionDot"></span>
          <span id="sessionTitle">未登录</span>
        </p>
        <button id="showLoginBtn" class="button topbar-login" type="button">登录</button>
        <button id="logoutBtn" class="button topbar-logout" type="button" hidden>退出</button>
      </div>
    </header>

    <main id="mainContent" class="workspace" tabindex="-1">
      <header class="workspace-head">
        <div class="toolbar">
          <div class="toolbar-filters">
            <div class="pill-group" id="typeFilters" aria-label="审核类型">
              <button class="pill is-active" data-type="goods" type="button">商品图片</button>
              <button class="pill" data-type="avatar" type="button">头像</button>
            </div>
            <div class="pill-group" id="statusFilters" aria-label="审核状态">
              <button class="pill is-active" data-status="PENDING" type="button">待审核</button>
              <button class="pill" data-status="APPROVED" type="button">已通过</button>
              <button class="pill" data-status="REJECTED" type="button">已驳回</button>
            </div>
          </div>
          <div class="toolbar-actions">
            <div class="search-box">
              <input id="searchInput" type="search" placeholder="搜索标题、ID 或卖家" class="search-input" aria-label="搜索审核记录">
              <button id="clearSearchBtn" class="button ghost search-clear" type="button" aria-label="清空搜索" title="清空搜索" hidden>清空</button>
            </div>
            <select id="pageSizeSelect" class="page-size-select" aria-label="每页显示数量">
              <option value="10">10条/页</option>
              <option value="20">20条/页</option>
              <option value="30">30条/页</option>
              <option value="50">50条/页</option>
            </select>
            <button id="approveAllBtn" class="button primary" type="button">全部通过</button>
            <button id="rejectAllBtn" class="button danger" type="button" hidden>全部驳回</button>
            <button id="refreshBtn" class="button secondary" type="button">刷新</button>
          </div>
        </div>
      </header>

      <section class="board">
        <section class="panel queue-panel">
          <div id="queueMeta" class="queue-meta">登录后可查看审核列表</div>
          <div id="queueList" class="queue-list"></div>
          <div class="pager">
            <button id="prevPageBtn" class="button ghost" type="button">上一页</button>
            <span id="pageIndicator">第 1 页</span>
            <button id="nextPageBtn" class="button ghost" type="button">下一页</button>
          </div>
        </section>

        <section class="panel detail-panel">
          <div id="detailContent" class="detail-content">
            <div class="empty-state">
              <h4>请选择图片</h4>
              <p>从左侧列表选择一条记录进行审核</p>
              <div class="keyboard-hints">
                <span><kbd>←</kbd><kbd>→</kbd> 切换</span>
                <span><kbd>A</kbd> 通过</span>
                <span><kbd>R</kbd> 驳回</span>
                <span><kbd>空格</kbd> 预览</span>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>

  <div id="loginModal" class="login-modal-overlay" aria-hidden="true">
    <div class="login-modal" role="dialog" aria-modal="true" aria-labelledby="loginModalTitle">
      <div class="login-modal-head">
        <div>
          <h3 id="loginModalTitle">审核员登录</h3>
          <p>登录后即可继续处理图片、商品和公告。</p>
        </div>
        <button id="closeLoginBtn" class="button ghost login-modal-close" type="button" aria-label="关闭登录弹窗">关闭</button>
      </div>
      <form id="loginForm" class="stack">
        <label class="field">
          <span>用户名</span>
          <input id="emailInput" type="text" placeholder="审核员账号" autocomplete="username" required>
        </label>
        <label class="field">
          <span>密码</span>
          <input id="passwordInput" type="password" placeholder="请输入密码" autocomplete="current-password" required>
        </label>
        <div class="auth-actions">
          <button id="loginBtn" class="button primary" type="submit">登录</button>
        </div>
      </form>
    </div>
  </div>

  <div id="imagePreviewModal" class="modal image-preview-modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content image-preview-content">
      <img id="previewImage" src="" alt="预览图片">
      <button id="closePreviewBtn" class="modal-close" type="button" aria-label="关闭图片预览">关闭</button>
    </div>
  </div>

  <script src="../js/messages.js"></script>
  <script src="../js/auth.js?v=20260724-compact-layout"></script>
  <script src="../js/app.js?v=20260724-compact-layout"></script>
</body>
</html>
